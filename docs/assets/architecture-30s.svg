<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Continuity Protocol 30-second architecture diagram</title>
  <desc id="desc">A high-level architecture diagram showing signed evidence flowing into proof bundles, verifiers, conformance, settlement, and policy-gated mainnet readiness.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="64" y="82" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700">Continuity Protocol</text>
  <text x="64" y="120" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Trust Signature Layer developer-preview flow</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .label { fill: #0f172a; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 24px; font-weight: 700; }
      .small { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 17px; }
      .warn { fill: #7c2d12; font-family: Inter, ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: 700; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="64" y="190" width="220" height="126" rx="8"/>
  <text class="label" x="88" y="234">Signed Evidence</text>
  <text class="small" x="88" y="266">identity, event, receipt,</text>
  <text class="small" x="88" y="292">attestation, revocation</text>

  <rect class="box" x="390" y="190" width="230" height="126" rx="8"/>
  <text class="label" x="414" y="234">Proof Bundle</text>
  <text class="small" x="414" y="266">canonical JSON, hashes,</text>
  <text class="small" x="414" y="292">Merkle proof, redaction</text>

  <rect class="box" x="726" y="190" width="220" height="126" rx="8"/>
  <text class="label" x="750" y="234">Verifier</text>
  <text class="small" x="750" y="266">schema, signatures,</text>
  <text class="small" x="750" y="292">policy, inclusion</text>

  <rect class="box" x="1030" y="190" width="190" height="126" rx="8"/>
  <text class="label" x="1054" y="234">Decision</text>
  <text class="small" x="1054" y="266">verified true/false</text>
  <text class="small" x="1054" y="292">canonical errors</text>

  <path class="arrow" d="M284 253 H382"/>
  <path class="arrow" d="M620 253 H718"/>
  <path class="arrow" d="M946 253 H1022"/>

  <rect class="box" x="390" y="430" width="230" height="126" rx="8"/>
  <text class="label" x="414" y="474">Conformance</text>
  <text class="small" x="414" y="506">test vectors, tamper cases,</text>
  <text class="small" x="414" y="532">cross-language parity</text>

  <rect class="box" x="726" y="430" width="220" height="126" rx="8"/>
  <text class="label" x="750" y="474">Settlement</text>
  <text class="small" x="750" y="506">offline receipt/log proof</text>
  <text class="small" x="750" y="532">mainnet policy gates</text>

  <rect x="1030" y="430" width="190" height="126" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text class="warn" x="1054" y="474">Not Production</text>
  <text class="small" x="1054" y="506">audit, ceremony, legal,</text>
  <text class="small" x="1054" y="532">ops approvals required</text>

  <path class="arrow" d="M505 316 V422"/>
  <path class="arrow" d="M836 316 V422"/>
  <path class="arrow" d="M946 493 H1022"/>
</svg>
