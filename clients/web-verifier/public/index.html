<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSL Web Verifier</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #171717;
        background: #f7f8fb;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 24px;
        letter-spacing: 0;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 650;
      }
      textarea,
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #cfd5df;
        border-radius: 6px;
        background: #fff;
        color: #161616;
        font: inherit;
      }
      textarea {
        min-height: 210px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }
      input {
        padding: 9px 10px;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #185abc;
        color: white;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        min-height: 180px;
        margin: 0;
        padding: 16px;
        overflow: auto;
        border: 1px solid #d9dee7;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 14px 0;
      }
      .row input[type="checkbox"] {
        width: auto;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 800;
      }
      .ok {
        background: #dff7e9;
        color: #116738;
      }
      .bad {
        background: #fde5e5;
        color: #9c1f1f;
      }
      .muted {
        color: #636b78;
        font-size: 13px;
      }
      @media (max-width: 760px) {
        main {
          padding: 18px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script type="module" src="/verifier.bundle.js"></script>
  </head>
  <body>
    <main>
      <h1>TSL Web Verifier</h1>
      <label for="input">Proof Bundle Or Link</label>
      <textarea id="input" placeholder="Paste tsl.proof_bundle.v1 JSON, a tsl://proof/... link, or an https://.../p/... link"></textarea>

      <div class="grid">
        <div>
          <label for="rpc">Optional RPC URL</label>
          <input id="rpc" placeholder="http://127.0.0.1:8545" />
        </div>
        <div>
          <label for="registry">Optional Checkpoint Registry</label>
          <input id="registry" placeholder="0x..." />
        </div>
      </div>

      <div class="row">
        <input id="require-settlement" type="checkbox" />
        <label for="require-settlement" style="margin: 0">Require chain settlement when RPC settings are present</label>
      </div>

      <div class="row">
        <button id="verify">Verify Locally</button>
        <span id="summary" class="muted">The bundled verifier runs in this browser.</span>
      </div>

      <pre id="output"></pre>
    </main>

    <script type="module">
      const input = document.getElementById("input");
      const output = document.getElementById("output");
      const summary = document.getElementById("summary");
      const rpc = document.getElementById("rpc");
      const registry = document.getElementById("registry");
      const requireSettlement = document.getElementById("require-settlement");
      const payload = location.pathname.includes("/p/") ? location.pathname.slice(location.pathname.lastIndexOf("/p/") + 3) : "";
      if (payload) input.value = payload;

      document.getElementById("verify").onclick = () => {
        void (async () => {
          try {
            const bundle = window.TSLWebVerifier.decodeProofPayload(input.value);
            const hasSettlementBackend = Boolean(rpc.value.trim() && registry.value.trim());
            const result = await window.TSLWebVerifier.verifyBundle(bundle, {
              rpcUrl: rpc.value.trim() || undefined,
              checkpointRegistryAddress: registry.value.trim() || undefined,
              policy: {
                require_inclusion: Boolean(bundle.proof),
                require_checkpoint: Boolean(bundle.checkpoint),
                require_settlement: Boolean(requireSettlement.checked && hasSettlementBackend),
              },
            });
            summary.className = `badge ${result.verified ? "ok" : "bad"}`;
            summary.textContent = result.verified ? "Verified" : "Not verified";
            output.textContent = JSON.stringify({ verification: result, bundle }, null, 2);
          } catch (error) {
            summary.className = "badge bad";
            summary.textContent = "Invalid bundle";
            output.textContent = error instanceof Error ? error.stack || error.message : String(error);
          }
        })();
      };
    </script>
  </body>
</html>
